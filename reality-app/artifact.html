<title>Realitní kalkulačka — vyplatí se koupit?</title>
<style>
  /* ─── Tokeny: „mosazný realitní ledger" ─────────────────────────────────── */
  :root {
    --bg:        #F4EFE4;
    --bg-grad:   radial-gradient(1200px 520px at 80% -10%, #FBF7EC 0%, rgba(251,247,236,0) 60%), radial-gradient(900px 500px at 0% 0%, #F7F1E2 0%, rgba(247,241,226,0) 55%);
    --surface:   #FFFFFF;
    --surface-2: #FBF7EE;
    --field:     #F4EEE1;
    --ink:       #211D15;
    --muted:     #786F5E;
    --faint:     #A79E8B;
    --line:      #E7DFCD;
    --line-2:    #D8CDB4;
    --brass:     #A97C1E;
    --brass-2:   #8A6417;
    --brass-bg:  rgba(169, 124, 30, 0.10);
    --good:      #2C8A5F;  --good-bg: rgba(44, 138, 95, 0.11);  --good-bd: rgba(44,138,95,.28);
    --warn:      #B27A16;  --warn-bg: rgba(178, 122, 22, 0.11); --warn-bd: rgba(178,122,22,.28);
    --bad:       #C0522F;  --bad-bg:  rgba(192, 82, 47, 0.11);  --bad-bd:  rgba(192,82,47,.28);
    --shadow:    0 1px 2px rgba(60,48,18,.05), 0 10px 30px rgba(60,48,18,.07);
    --shadow-lg: 0 2px 6px rgba(60,48,18,.06), 0 22px 50px rgba(60,48,18,.11);
    --radius:    15px;
    /* Jeden font všude — systémový sans. Čísla se zarovnávají přes tabular-nums. */
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    --serif: var(--sans);
    --mono: var(--sans);
    --ease: cubic-bezier(.22,.7,.2,1);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme]) {
      --bg:#14120E; --bg-grad:radial-gradient(1100px 500px at 82% -12%, #22201A 0%, rgba(34,32,26,0) 60%);
      --surface:#1E1B15; --surface-2:#232019; --field:#17140F;
      --ink:#EDE7D9; --muted:#9A9282; --faint:#6E6759; --line:rgba(233,220,190,.09); --line-2:rgba(233,220,190,.16);
      --brass:#C9A24B; --brass-2:#DDB865; --brass-bg:rgba(201,162,75,.12);
      --good:#78C9A0; --good-bg:rgba(120,201,160,.11); --good-bd:rgba(120,201,160,.24);
      --warn:#E0B457; --warn-bg:rgba(224,180,87,.11); --warn-bd:rgba(224,180,87,.24);
      --bad:#E08A6E;  --bad-bg:rgba(224,138,110,.11); --bad-bd:rgba(224,138,110,.26);
      --shadow:0 1px 0 rgba(255,255,255,.03), 0 10px 34px rgba(0,0,0,.42);
      --shadow-lg:0 2px 0 rgba(255,255,255,.04), 0 26px 60px rgba(0,0,0,.55);
    }
  }
  :root[data-theme="light"] {
    --bg:#F4EFE4; --bg-grad:radial-gradient(1200px 520px at 80% -10%, #FBF7EC 0%, rgba(251,247,236,0) 60%), radial-gradient(900px 500px at 0% 0%, #F7F1E2 0%, rgba(247,241,226,0) 55%);
    --surface:#FFFFFF; --surface-2:#FBF7EE; --field:#F4EEE1;
    --ink:#211D15; --muted:#786F5E; --faint:#A79E8B; --line:#E7DFCD; --line-2:#D8CDB4;
    --brass:#A97C1E; --brass-2:#8A6417; --brass-bg:rgba(169,124,30,.10);
    --good:#2C8A5F; --good-bg:rgba(44,138,95,.11); --good-bd:rgba(44,138,95,.28);
    --warn:#B27A16; --warn-bg:rgba(178,122,22,.11); --warn-bd:rgba(178,122,22,.28);
    --bad:#C0522F;  --bad-bg:rgba(192,82,47,.11);  --bad-bd:rgba(192,82,47,.28);
    --shadow:0 1px 2px rgba(60,48,18,.05), 0 10px 30px rgba(60,48,18,.07);
    --shadow-lg:0 2px 6px rgba(60,48,18,.06), 0 22px 50px rgba(60,48,18,.11);
  }
  :root[data-theme="dark"] {
    --bg:#14120E; --bg-grad:radial-gradient(1100px 500px at 82% -12%, #22201A 0%, rgba(34,32,26,0) 60%);
    --surface:#1E1B15; --surface-2:#232019; --field:#17140F;
    --ink:#EDE7D9; --muted:#9A9282; --faint:#6E6759; --line:rgba(233,220,190,.09); --line-2:rgba(233,220,190,.16);
    --brass:#C9A24B; --brass-2:#DDB865; --brass-bg:rgba(201,162,75,.12);
    --good:#78C9A0; --good-bg:rgba(120,201,160,.11); --good-bd:rgba(120,201,160,.24);
    --warn:#E0B457; --warn-bg:rgba(224,180,87,.11); --warn-bd:rgba(224,180,87,.24);
    --bad:#E08A6E;  --bad-bg:rgba(224,138,110,.11); --bad-bd:rgba(224,138,110,.26);
    --shadow:0 1px 0 rgba(255,255,255,.03), 0 10px 34px rgba(0,0,0,.42);
    --shadow-lg:0 2px 0 rgba(255,255,255,.04), 0 26px 60px rgba(0,0,0,.55);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    min-height: 100vh;
    background: var(--bg-grad), var(--bg);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    transition: background-color .4s var(--ease), color .3s var(--ease);
  }
  h1,h2,h3 { margin: 0; }
  button { font-family: inherit; cursor: pointer; }

  /* ─── Masthead ─────────────────────────────────────────────────────────── */
  .masthead {
    position: sticky; top: 0; z-index: 40;
    display: flex; align-items: center; gap: 14px;
    padding: 13px clamp(16px, 4vw, 40px);
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: blur(18px) saturate(1.5);
    -webkit-backdrop-filter: blur(18px) saturate(1.5);
    border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: baseline; gap: 11px; min-width: 0; }
  .brand .mark { font-family: var(--serif); font-size: 21px; font-weight: 700; letter-spacing: -.02em; white-space: nowrap; }
  .brand .mark b { color: var(--brass); font-weight: 700; }
  .brand .tag { font-size: 11.5px; color: var(--muted); white-space: nowrap; padding-left: 11px; border-left: 1px solid var(--line-2); }
  @media (max-width: 620px){ .brand .tag { display:none; } }
  .spacer { margin-left: auto; }
  .mh-actions { display: flex; align-items: center; gap: 8px; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 14px; border-radius: 10px;
    border: 1px solid var(--line-2); background: var(--surface);
    color: var(--ink); font-size: 13px; font-weight: 550;
    transition: border-color .18s var(--ease), background .18s var(--ease), color .18s var(--ease), transform .06s, box-shadow .18s;
  }
  .btn:hover { border-color: var(--brass); box-shadow: 0 3px 12px rgba(120,90,20,.10); }
  .btn:active { transform: translateY(1px); }
  .btn:focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }
  .btn-primary { background: var(--brass); border-color: var(--brass); color: #fff; font-weight: 650; }
  :root[data-theme="dark"] .btn-primary { color: #1a1305; }
  @media (prefers-color-scheme: dark){ :root:not([data-theme]) .btn-primary { color:#1a1305; } }
  .btn-primary:hover { background: var(--brass-2); border-color: var(--brass-2); box-shadow: 0 6px 18px rgba(120,90,20,.28); }
  .btn-icon { padding: 8px 10px; }
  .btn-ghost { background: transparent; }
  .btn:disabled { opacity: .5; cursor: default; box-shadow: none; }
  .btn.danger:hover { border-color: var(--bad); color: var(--bad); box-shadow: none; }

  /* ─── Language segmented control ───────────────────────────────────────── */
  .seg { position: relative; display: inline-flex; padding: 3px; background: var(--field); border: 1px solid var(--line-2); border-radius: 11px; }
  .seg .thumb {
    position: absolute; top: 3px; left: 3px; height: calc(100% - 6px); width: 42px;
    background: var(--surface); border-radius: 8px; box-shadow: 0 1px 4px rgba(80,60,20,.14);
    transition: transform .28s var(--ease); z-index: 0;
  }
  :root[data-theme="dark"] .seg .thumb, :root:not([data-theme]) .seg .thumb { box-shadow: 0 1px 5px rgba(0,0,0,.4); }
  .seg[data-active="vi"] .thumb { transform: translateX(42px); }
  .seg button {
    position: relative; z-index: 1; border: none; background: transparent; width: 42px;
    padding: 6px 0; font-size: 12px; font-weight: 650; letter-spacing: .03em;
    color: var(--muted); transition: color .2s var(--ease);
  }
  .seg button.active { color: var(--brass); }

  /* ─── Saved dropdown ───────────────────────────────────────────────────── */
  .dd { position: relative; }
  .dd-panel {
    position: absolute; right: 0; top: calc(100% + 8px); width: min(340px, 86vw);
    background: var(--surface); border: 1px solid var(--line-2); border-radius: 14px;
    box-shadow: var(--shadow-lg); padding: 8px; z-index: 60;
    max-height: 70vh; overflow-y: auto;
    opacity: 0; transform: translateY(-8px) scale(.98); transform-origin: top right;
    pointer-events: none; transition: opacity .2s var(--ease), transform .2s var(--ease);
  }
  .dd-panel.open { opacity: 1; transform: none; pointer-events: auto; }
  .dd-empty { padding: 18px 12px; color: var(--muted); font-size: 13px; text-align: center; line-height: 1.6; }
  .saved-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 10px; cursor: pointer; transition: background .15s; }
  .saved-item:hover { background: var(--surface-2); }
  .saved-item .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
  .saved-item .si-main { min-width: 0; flex: 1; }
  .saved-item .si-title { font-weight: 600; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .saved-item .si-sub { font-size: 11.5px; color: var(--muted); }
  .saved-item .si-del { border: none; background: transparent; color: var(--faint); font-size: 16px; padding: 2px 6px; border-radius: 7px; line-height: 1; transition: color .15s, background .15s; }
  .saved-item .si-del:hover { color: var(--bad); background: var(--bad-bg); }

  /* ─── Layout ───────────────────────────────────────────────────────────── */
  .wrap { max-width: 1220px; margin: 0 auto; padding: clamp(18px, 3vw, 30px) clamp(16px, 4vw, 40px) 90px; }
  .lede { max-width: 640px; margin: 0 0 24px; color: var(--muted); font-size: 14.5px; }
  .lede b { color: var(--ink); font-weight: 600; }

  .grid { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 22px; align-items: start; }
  @media (max-width: 940px) { .grid { grid-template-columns: 1fr; } .results { position: static !important; } }

  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); transition: box-shadow .25s var(--ease), border-color .25s var(--ease), background .3s var(--ease); }
  .form-card { padding: clamp(16px, 2.4vw, 24px); }
  .results { position: sticky; top: 78px; display: flex; flex-direction: column; gap: 16px; }

  /* ─── Entrance animation ───────────────────────────────────────────────── */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  .anim { opacity: 0; animation: fadeUp .6s var(--ease) forwards; }

  /* ─── Form ─────────────────────────────────────────────────────────────── */
  .section + .section { margin-top: 22px; padding-top: 20px; border-top: 1px solid var(--line); }
  .sec-title { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--brass); margin-bottom: 13px; }
  .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 13px 14px; }
  @media (max-width: 460px) { .fields { grid-template-columns: 1fr; } }
  .grp-collapse { overflow: hidden; transition: max-height .34s var(--ease), opacity .28s var(--ease), margin-top .28s var(--ease); }
  .field { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .field.col2 { grid-column: 1 / -1; }
  .field label { font-size: 12.5px; color: var(--muted); font-weight: 500; }
  .field label .opt { color: var(--faint); font-weight: 400; }
  .inwrap { position: relative; display: flex; align-items: center; }
  .in { width: 100%; background: var(--field); border: 1px solid var(--line); border-radius: 10px; padding: 10px 48px 10px 12px; color: var(--ink); font-size: 14.5px; font-family: var(--mono); font-variant-numeric: tabular-nums; transition: border-color .16s var(--ease), background .16s var(--ease), box-shadow .16s; }
  .in.text { font-family: var(--sans); padding-right: 12px; }
  .in:focus { outline: none; border-color: var(--brass); background: var(--surface); box-shadow: 0 0 0 3px var(--brass-bg); }
  .suffix { position: absolute; right: 12px; font-size: 12px; color: var(--faint); pointer-events: none; font-family: var(--sans); }

  .toggle { display: inline-flex; gap: 3px; padding: 3px; background: var(--field); border: 1px solid var(--line); border-radius: 11px; }
  .toggle button { border: none; background: transparent; color: var(--muted); font-size: 13px; font-weight: 550; padding: 7px 18px; border-radius: 8px; transition: background .2s var(--ease), color .2s var(--ease); }
  .toggle button.active { background: var(--brass-bg); color: var(--brass); box-shadow: inset 0 0 0 1px var(--brass-bd, var(--brass)); }
  .note { font-size: 11.5px; color: var(--faint); line-height: 1.5; margin: 9px 0 0; }
  .taxrow { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .minilabel { font-size: 12.5px; color: var(--muted); font-weight: 500; }
  #taxToggle button { padding: 7px 14px; font-size: 12.5px; }

  /* ─── Verdict ──────────────────────────────────────────────────────────── */
  .verdict { border-radius: var(--radius); padding: 18px 20px; border: 1px solid; transition: background .45s var(--ease), border-color .45s var(--ease); }
  .verdict.good { background: var(--good-bg); border-color: var(--good-bd); }
  .verdict.borderline { background: var(--warn-bg); border-color: var(--warn-bd); }
  .verdict.poor { background: var(--bad-bg); border-color: var(--bad-bd); }
  .v-top { display: flex; align-items: center; gap: 11px; }
  .v-badge { width: 11px; height: 11px; border-radius: 50%; flex: 0 0 auto; transition: background .4s; }
  @keyframes pulse { 0%{ box-shadow: 0 0 0 0 currentColor; } 70%{ box-shadow: 0 0 0 7px transparent; } 100%{ box-shadow: 0 0 0 0 transparent; } }
  .verdict.good .v-badge { background: var(--good); color: var(--good); }
  .verdict.borderline .v-badge { background: var(--warn); color: var(--warn); }
  .verdict.poor .v-badge { background: var(--bad); color: var(--bad); }
  .v-badge.pulse { animation: pulse .7s var(--ease); }
  .v-label { font-family: var(--serif); font-size: 21px; font-weight: 700; letter-spacing: -.02em; text-wrap: balance; transition: color .4s; }
  .verdict.good .v-label { color: var(--good); }
  .verdict.borderline .v-label { color: var(--warn); }
  .verdict.poor .v-label { color: var(--bad); }
  .v-summary { font-size: 13px; color: var(--muted); margin: 8px 0 0; line-height: 1.55; }
  .reasons { list-style: none; margin: 13px 0 0; padding: 0; display: flex; flex-direction: column; gap: 7px; }
  .reasons li { position: relative; padding-left: 16px; font-size: 12.5px; color: var(--muted); line-height: 1.45; animation: fadeUp .4s var(--ease) both; }
  .reasons li::before { content: '›'; position: absolute; left: 3px; color: var(--brass); font-weight: 700; }

  /* ─── Metrics ──────────────────────────────────────────────────────────── */
  .pad { padding: 18px; }
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
  .metric { background: var(--surface-2); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; transition: transform .18s var(--ease), border-color .2s, box-shadow .2s; }
  .metric:hover { transform: translateY(-2px); border-color: var(--line-2); box-shadow: var(--shadow); }
  .m-label { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 5px; }
  .m-value { font-family: var(--serif); font-size: 25px; font-weight: 700; letter-spacing: -.02em; font-variant-numeric: tabular-nums; line-height: 1.05; transition: color .3s var(--ease); }
  .m-sub { font-size: 11px; color: var(--faint); margin-top: 3px; }
  .pos { color: var(--good); } .neg { color: var(--bad); } .gold { color: var(--brass); }

  .block-title { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--brass); margin: 0 0 6px; }
  .rows { display: flex; flex-direction: column; }
  .row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; padding: 8px 0; font-size: 13px; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: none; }
  .row .k { color: var(--muted); }
  .row .v { font-family: var(--mono); font-variant-numeric: tabular-nums; font-weight: 600; white-space: nowrap; transition: color .3s; }
  .row.total { border-top: 1.5px solid var(--line-2); }
  .row.total .k { color: var(--ink); font-weight: 600; }

  /* ─── Chart ────────────────────────────────────────────────────────────── */
  .chart-wrap { position: relative; }
  svg.chart { width: 100%; height: auto; display: block; }
  .chart path.line { fill: none; }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  @keyframes areafade { from { opacity: 0; } to { opacity: 1; } }
  .chart path.line.draw { stroke-dasharray: 1; stroke-dashoffset: 1; animation: draw 1s var(--ease) forwards; }
  .chart path.area.draw { animation: areafade 1s ease forwards; }
  .chart circle.dot.draw { opacity: 0; animation: areafade .5s ease .85s forwards; }
  .legend { display: flex; flex-wrap: wrap; gap: 6px 15px; margin-top: 10px; font-size: 11.5px; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .legend i { width: 16px; height: 3px; border-radius: 2px; display: inline-block; }
  .tip { position: absolute; pointer-events: none; z-index: 5; background: var(--surface); border: 1px solid var(--line-2); border-radius: 10px; box-shadow: var(--shadow-lg); padding: 9px 11px; font-size: 11.5px; min-width: 156px; opacity: 0; transition: opacity .12s, left .06s linear; }
  .tip .tip-yr { font-weight: 700; margin-bottom: 5px; font-size: 12px; }
  .tip .tip-row { display: flex; justify-content: space-between; gap: 12px; }
  .tip .tip-row b { font-family: var(--mono); font-variant-numeric: tabular-nums; font-weight: 600; }

  details.proj { margin-top: 14px; }
  details.proj > summary { cursor: pointer; font-size: 12.5px; color: var(--muted); padding: 4px 0; list-style: none; transition: color .15s; }
  details.proj > summary:hover { color: var(--brass); }
  details.proj > summary::-webkit-details-marker { display: none; }
  details.proj > summary::before { content: '▸'; color: var(--brass); display: inline-block; margin-right: 6px; transition: transform .2s var(--ease); }
  details.proj[open] > summary::before { transform: rotate(90deg); }
  .table-scroll { overflow-x: auto; margin-top: 8px; }
  table.proj { width: 100%; border-collapse: collapse; font-size: 12px; font-family: var(--mono); font-variant-numeric: tabular-nums; }
  table.proj th, table.proj td { padding: 7px 9px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--line); }
  table.proj th { color: var(--faint); font-weight: 500; font-size: 10.5px; letter-spacing: .04em; text-transform: uppercase; font-family: var(--sans); }
  table.proj th:first-child, table.proj td:first-child { text-align: left; }
  table.proj td { color: var(--muted); }
  table.proj tbody tr { transition: background .12s; }
  table.proj tbody tr:hover { background: var(--surface-2); }

  .actions { display: flex; flex-direction: column; gap: 12px; }
  .actions .row-btns { display: flex; gap: 10px; flex-wrap: wrap; }
  .toast { font-size: 13px; min-height: 0; transition: color .2s; }
  .toast.ok { color: var(--good); } .toast.err { color: var(--bad); }
  .disclaimer { font-size: 11.5px; color: var(--faint); line-height: 1.55; margin: 0; }

  /* ─── AI poradce ───────────────────────────────────────────────────────── */
  .ai-tabs { display: inline-flex; gap: 3px; padding: 3px; background: var(--field); border: 1px solid var(--line); border-radius: 11px; margin-bottom: 14px; }
  .ai-tabs button { border: none; background: transparent; color: var(--muted); font-size: 12.5px; font-weight: 550; padding: 6px 13px; border-radius: 8px; transition: background .2s var(--ease), color .2s var(--ease); }
  .ai-tabs button.active { background: var(--brass-bg); color: var(--brass); box-shadow: inset 0 0 0 1px var(--brass); }
  .ai-pane { display: flex; flex-direction: column; gap: 10px; }
  .ai-pane[hidden] { display: none; }
  .ai-textarea { width: 100%; box-sizing: border-box; background: var(--field); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; color: var(--ink); font-family: var(--sans); font-size: 13.5px; line-height: 1.5; resize: vertical; transition: border-color .16s var(--ease), background .16s var(--ease); }
  .ai-textarea:focus { outline: none; border-color: var(--brass); background: var(--surface); box-shadow: 0 0 0 3px var(--brass-bg); }
  .ai-out { font-size: 13px; color: var(--ink); line-height: 1.6; white-space: pre-wrap; }
  .ai-out:empty { display: none; }
  .ai-out.muted { color: var(--muted); }
  .ai-chat { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; padding-right: 2px; }
  .ai-chat:empty { display: none; }
  .ai-bubble { padding: 9px 12px; border-radius: 13px; font-size: 13px; line-height: 1.5; max-width: 88%; white-space: pre-wrap; animation: fadeUp .3s var(--ease) both; }

<script>
"use strict";
/* ════════════════════════════════════════════════════════════════════════════
   Realitní kalkulačka — jádro výpočtu, i18n (cs/vi), UI a animace. Vše lokálně.
   ════════════════════════════════════════════════════════════════════════════ */

let LANG = 'cs';
let LOCALE = 'cs-CZ';

// ─── Formátování ────────────────────────────────────────────────────────────
const nf = (n,d=0) => new Intl.NumberFormat(LOCALE,{maximumFractionDigits:d,minimumFractionDigits:d}).format(isFinite(n)?n:0);
const czk = (n,d=0) => nf(n,d) + ' Kč';
const pct = (n,d=1) => nf(n,d) + ' %';
function czkCompact(v){
  const a=Math.abs(v);
  if(a>=1e6) return nf(v/1e6,1)+' '+t('u_mil');
  if(a>=1e3) return nf(Math.round(v/1e3))+' '+t('u_th');
  return nf(Math.round(v));
}
const clampPct = v => Math.min(100, Math.max(0, v));

// ─── Výpočetní jádro ────────────────────────────────────────────────────────
function monthlyPayment(P, ratePct, years){
  if(P<=0 || years<=0) return 0;
  const r=ratePct/100/12, n=years*12;
  if(r===0) return P/n;
  return (P*r)/(1-Math.pow(1+r,-n));
}
function amortizeYear(balance, ratePct, payment){
  const r=ratePct/100/12; let interest=0, principal=0;
  for(let m=0;m<12 && balance>0.005;m++){
    const mi=balance*r; let mp=payment-mi; if(mp>balance)mp=balance;
    interest+=mi; principal+=mp; balance-=mp;
  }
  return {interest, principal, endingBalance:Math.max(0,balance)};
}
function irr(flows){
  const npv = rate => flows.reduce((a,f,i)=>a+f/Math.pow(1+rate,i),0);
  if(!flows.some(f=>f>0)||!flows.some(f=>f<0)) return 0;
  let lo=-0.9999, hi=2, nLo=npv(lo);
  if(nLo*npv(hi)>0) return 0;
  for(let i=0;i<100;i++){ const mid=(lo+hi)/2, val=npv(mid); if(Math.abs(val)<1e-6) return mid; if(nLo*val<0){hi=mid;}else{lo=mid;nLo=val;} }
  return (lo+hi)/2;
}
const GAINS_EXEMPT_YEARS = 10; // osvobození příjmu z prodeje po 10 letech držby (nabytí od 2021)
function calculate(input){
  const isM = input.financing==='mortgage';
  const totalAcq = input.purchasePrice + input.acquisitionCosts + input.renovationCosts;
  const downPayment = isM ? input.purchasePrice*clampPct(input.downPaymentPct)/100 : input.purchasePrice;
  const loanAmount = isM ? Math.max(0, input.purchasePrice-downPayment) : 0;
  const totalCash = downPayment + input.acquisitionCosts + input.renovationCosts;
  const ltv = input.purchasePrice>0 ? loanAmount/input.purchasePrice*100 : 0;
  const payment = monthlyPayment(loanAmount, input.interestRate, input.loanTermYears);
  const annualDebt = payment*12;
  const vac = clampPct(input.vacancyPct)/100;
  const grossAnnual = (input.monthlyRent+input.otherMonthlyIncome)*12;
  const effAnnual = grossAnnual*(1-vac);
  const mgmt = effAnnual*clampPct(input.managementPct)/100;
  const maint = effAnnual*clampPct(input.maintenancePct)/100;
  const opex = input.hoaMonthly*12 + input.propertyTaxYearly + input.insuranceYearly + mgmt + maint;
  const noi = effAnnual - opex;
  const preTax = noi - annualDebt;
  const grossYield = totalAcq>0 ? grossAnnual/totalAcq*100 : 0;
  const netYield = totalAcq>0 ? noi/totalAcq*100 : 0;
  const coc = totalCash>0 ? preTax/totalCash*100 : 0;
  const dscr = isM && annualDebt>0 ? noi/annualDebt : null;
  const fixed = input.hoaMonthly*12 + input.propertyTaxYearly + input.insuranceYearly;
  const varRate = (clampPct(input.managementPct)+clampPct(input.maintenancePct))/100;
  const denom = (1-vac)*(1-varRate);
  const beGross = denom>0 ? (fixed+annualDebt)/denom : 0;
  const breakEvenRent = Math.max(0, beGross/12 - input.otherMonthlyIncome);

  const horizon = Math.max(1, Math.round(input.horizonYears));
  const g=input.rentGrowthPct/100, ap=input.appreciationPct/100, taxRate=clampPct(input.incomeTaxPct)/100;
  const flat30 = input.taxMethod==='flat30';
  // Roční odpis (jen u skutečných nákladů): rovnoměrně z pořizovací ceny + rekonstrukce.
  const depreciation = (!flat30 && input.depreciationYears>0)
    ? (input.purchasePrice + input.renovationCosts) / input.depreciationYears : 0;

  const projection=[]; let balance=loanAmount, cumulative=0; const flows=[-totalCash];
  let curRate=input.interestRate, curPayment=payment, refixed=false;
  for(let y=1;y<=horizon;y++){
    const grow=Math.pow(1+g,y-1);
    const grossRent=grossAnnual*grow, effRent=grossRent*(1-vac);
    const mgmtY=effRent*clampPct(input.managementPct)/100, maintY=effRent*clampPct(input.maintenancePct)/100;
    const opexY=(input.hoaMonthly*12+input.propertyTaxYearly+input.insuranceYearly)*grow+mgmtY+maintY;
    const noiY=effRent-opexY;
    let interest=0, principal=0;
    if(isM && balance>0){
      // Po fixaci se přesadí sazba a splátka se přepočítá na zbývající dobu.
      if(!refixed && y>input.fixationYears && input.rateAfterFix!==input.interestRate){
        curRate=input.rateAfterFix;
        curPayment=monthlyPayment(balance, curRate, Math.max(1, input.loanTermYears-(y-1)));
        refixed=true;
      }
      const am=amortizeYear(balance,curRate,curPayment); interest=am.interest; principal=am.principal; balance=am.endingBalance;
    }
    const debt=interest+principal;
    // Daňový základ: paušál 30 % z nájmu, nebo skutečné náklady + úroky + odpisy.
    const taxable = flat30 ? effRent*0.70 : Math.max(0, effRent-opexY-interest-depreciation);
    const incomeTax = Math.max(0,taxable)*taxRate;
    const pre=noiY-debt, after=pre-incomeTax;
    cumulative+=after;
    const value=input.purchasePrice*Math.pow(1+ap,y);
    const equity=value-balance;
    flows.push(after);
    projection.push({year:y,value,grossRent,effRent,opex:opexY,noi:noiY,interest,principal,debt,incomeTax,pre,after,balance,equity,cumulative});
  }
  // ── Exit: prodej na konci horizontu ──
  const last=projection[projection.length-1];
  const exitValue=last.value;
  const exitSellCosts=exitValue*clampPct(input.sellingCostPct)/100;
  const exitGain=exitValue-exitSellCosts-totalAcq;
  const exitCapGainsTax=(horizon<GAINS_EXEMPT_YEARS && exitGain>0) ? exitGain*taxRate : 0;
  const exitProceeds=exitValue-exitSellCosts-last.balance-exitCapGainsTax;
  flows[flows.length-1]+=exitProceeds;

  const profit=exitProceeds+cumulative-totalCash;
  const totalReturn=totalCash>0?profit/totalCash*100:0;
  const annualized=irr(flows)*100;
  const verdict=buildVerdict({isM, monthlyPre:preTax/12, coc, netYield, grossYield, rate:input.interestRate, dscr, annualized});
  return { totalAcq, downPayment, loanAmount, totalCash, ltv, monthlyMortgage:payment, monthlyPre:preTax/12,
    grossAnnual, effAnnual, opex, noi, annualDebt, preTax, annualAfter:projection[0].after, depreciation, refixed,
    grossYield, netYield, coc, dscr, paybackYears: projection[0].after>0 ? totalCash/projection[0].after : null,
    breakEvenRent, projection, totalReturn, annualized, verdict, isM,
    exitYear:horizon, exitValue, exitSellCosts, exitCapGainsTax, exitProceeds, exitExempt:horizon>=GAINS_EXEMPT_YEARS };
}

// Reasons se skládají přes t() v aktuálním jazyce.
function buildVerdict(m){
  let score=0; const reasons=[]; const f=n=>nf(Math.round(n)); const p=(x,d=1)=>nf(x,d);
  if(m.monthlyPre>=2000){ score+=2; reasons.push(t('r_cf_strong', f(m.monthlyPre))); }
  else if(m.monthlyPre>=0){ score+=1; reasons.push(t('r_cf_slight', f(m.monthlyPre))); }
  else { reasons.push(t('r_cf_neg', f(m.monthlyPre))); }

  if(m.netYield>=5){ score+=2; reasons.push(t('r_ny_high', p(m.netYield))); }
  else if(m.netYield>=3.5){ score+=1; reasons.push(t('r_ny_mid', p(m.netYield))); }
  else { reasons.push(t('r_ny_low', p(m.netYield))); }

  if(m.coc>=6){ score+=2; reasons.push(t('r_coc_high', p(m.coc))); }
  else if(m.coc>=3){ score+=1; reasons.push(t('r_coc_mid', p(m.coc))); }
  else if(m.coc>=0){ reasons.push(t('r_coc_low', p(m.coc))); }
  else { reasons.push(t('r_coc_neg', p(m.coc))); }

  if(m.isM){
    if(m.netYield>m.rate){ score+=1; reasons.push(t('r_lev_pos', p(m.netYield), p(m.rate))); }
    else { reasons.push(t('r_lev_neg', p(m.rate), p(m.netYield))); }
    if(m.dscr!==null){
      if(m.dscr>=1.25){ score+=1; reasons.push(t('r_dscr_ok', p(m.dscr,2))); }
      else if(m.dscr<1){ reasons.push(t('r_dscr_bad', p(m.dscr,2))); }
    }
  }
  if(m.annualized>=8){ reasons.push(t('r_tot_high', p(m.annualized))); }
  else if(m.annualized>0){ reasons.push(t('r_tot_pos', p(m.annualized))); }

  const max=m.isM?10:8, ratio=score/max;
  if(ratio>=0.6 && m.monthlyPre>=0) return {rating:'good', label:t('v_good'), summary:t('v_good_sum'), reasons};
  if(ratio>=0.35) return {rating:'borderline', label:t('v_bord'), summary:t('v_bord_sum'), reasons};
  return {rating:'poor', label:t('v_poor'), summary:t('v_poor_sum'), reasons};
}

// ─── Formulář ─────────────────────────────────────────────────────────────────
function fieldHTML(key,labelKey,suffixKey,step,min){
  const minAttr = min===null ? '' : `min="${min}"`;
  return `<div class="field"><label for="i-${key}" data-i18n="${labelKey}"></label>
    <div class="inwrap"><input class="in" type="number" inputmode="decimal" id="i-${key}" data-key="${key}" step="${step}" ${minAttr}>
    <span class="suffix" data-i18n="${suffixKey}"></span></div></div>`;
}
function buildForm(){
  for(const [grp,list] of Object.entries(FIELDS)){
    document.getElementById('grp-'+grp).innerHTML = list.map(a=>fieldHTML(...a)).join('');
  }
  document.querySelectorAll('input[data-key]').forEach(el=>{
    el.addEventListener('input', ()=>{ const v=el.value===''?0:Number(el.value); state[el.dataset.key]=isFinite(v)?v:0; render(false); });
    el.addEventListener('focus', ()=>el.select());
  });
}
function syncInputs(){
  document.querySelectorAll('input[data-key]').forEach(el=>{ el.value = state[el.dataset.key]; });
  document.getElementById('f-title').value = state._title||'';
  document.getElementById('f-address').value = state._address||'';
  document.querySelectorAll('#finToggle button').forEach(b=> b.classList.toggle('active', b.dataset.fin===state.financing));
  document.querySelectorAll('#taxToggle button').forEach(b=> b.classList.toggle('active', b.dataset.tax===(state.taxMethod||'real')));
  const col=document.getElementById('finCollapse');
  col.style.maxHeight = state.financing==='mortgage' ? '320px' : '0px';
  col.style.opacity = state.financing==='mortgage' ? '1' : '0';
}

// ─── i18n aplikace na statické prvky ─────────────────────────────────────────
function applyStaticI18n(){
  document.documentElement.lang = LANG;
  document.title = t('docTitle');
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{ el.innerHTML = t(el.dataset.i18nHtml); });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ el.placeholder = t(el.dataset.i18nPh); });
  document.querySelectorAll('[data-i18n-title]').forEach(el=>{ el.title = t(el.dataset.i18nTitle); });
}

function metricHTML(label,value,sub,tone){ const c=tone?` ${tone}`:''; return `<div class="metric"><div class="m-label">${label}</div><div class="m-value${c}">${value}</div>${sub?`<div class="m-sub">${sub}</div>`:''}</div>`; }
function rowHTML(k,v,cls='',vcls=''){ return `<div class="row ${cls}"><span class="k">${k}</span><span class="v ${vcls}">${v}</span></div>`; }

let prevRating = null;
function render(animate){
  const r = calculate(state); const isM=r.isM;

  const vc=document.getElementById('verdict');
  vc.className='verdict '+r.verdict.rating;
  document.getElementById('v-label').textContent=r.verdict.label;
  document.getElementById('v-summary').textContent=r.verdict.summary;
  document.getElementById('v-reasons').innerHTML=r.verdict.reasons.map((x,i)=>`<li style="animation-delay:${i*40}ms">${x}</li>`).join('');
  if(prevRating && prevRating!==r.verdict.rating){ const b=vc.querySelector('.v-badge'); b.classList.remove('pulse'); void b.offsetWidth; b.classList.add('pulse'); }
  prevRating=r.verdict.rating;

  const cf=r.monthlyPre;
  document.getElementById('metrics').innerHTML=[
    metricHTML(t('m_cf'), czk(cf), t('m_cf_sub'), cf>=0?'pos':'neg'),
    metricHTML(t('m_ny'), pct(r.netYield), t('m_ny_sub'), 'gold'),
    metricHTML(t('m_coc'), pct(r.coc), t('m_coc_sub'), r.coc>=0?'':'neg'),
    metricHTML(t('m_gy'), pct(r.grossYield), t('m_gy_sub')),
    metricHTML(t('m_tot'), pct(r.annualized), t('m_tot_sub', state.horizonYears), r.annualized>=0?'pos':'neg'),
    isM ? metricHTML(t('m_dscr'), r.dscr!==null?nf(r.dscr,2):'—', t('m_dscr_sub'), r.dscr!==null&&r.dscr>=1?'pos':'neg')
        : metricHTML(t('m_payback'), r.paybackYears!==null?t('n_years',r.paybackYears):'—', t('m_payback_sub')),
  ].join('');

  let acq = rowHTML(t('rw_totalacq'), czk(r.totalAcq)) + rowHTML(t('rw_equity'), czk(r.totalCash), '', 'gold');
  if(isM){ acq += rowHTML(t('rw_loanltv'), `${czk(r.loanAmount)} · ${pct(r.ltv,0)}`) + rowHTML(t('rw_mortgage'), czk(r.monthlyMortgage)); }
  document.getElementById('acquisition').innerHTML=acq;

  document.getElementById('cf-title').textContent=t('cf_year');
  let cfb = rowHTML(t('rw_effrent'), czk(r.effAnnual)) + rowHTML(t('rw_opex'), '−'+czk(r.opex)) + rowHTML(t('rw_noi'), czk(r.noi));
  if(isM) cfb += rowHTML(t('rw_debt'), '−'+czk(r.annualDebt));
  cfb += rowHTML(t('rw_pretax'), czk(r.preTax), 'total', r.preTax>=0?'pos':'neg') + rowHTML(t('rw_aftertax'), czk(r.annualAfter), '', r.annualAfter>=0?'pos':'neg');
  document.getElementById('cashflow').innerHTML=cfb;
  document.getElementById('breakeven').innerHTML=t('breakeven', czk(r.breakEvenRent));

  document.getElementById('chart-title').textContent=t('chart_title', state.horizonYears);
  document.getElementById('exit-note').innerHTML =
    t('note_exit', r.exitYear, czk(r.exitProceeds), czk(r.exitSellCosts), czk(r.exitCapGainsTax), r.exitExempt)
    + (isM && r.refixed ? ' '+t('note_refix') : '');
  drawChart(r, animate);
  document.getElementById('projTable').innerHTML =
    `<thead><tr><th>${t('tbl_year')}</th><th>${t('tbl_value')}</th><th>${t('tbl_loan')}</th><th>${t('tbl_equity')}</th><th>${t('tbl_cf')}</th><th>${t('tbl_cumcf')}</th></tr></thead><tbody>`+
    r.projection.map(p=>`<tr><td>${p.year}.</td><td>${czkCompact(p.value)}</td><td>${czkCompact(p.balance)}</td><td>${czkCompact(p.equity)}</td><td style="color:${p.after>=0?'var(--good)':'var(--bad)'}">${czkCompact(p.after)}</td><td>${czkCompact(p.cumulative)}</td></tr>`).join('')+
    `</tbody>`;

  lastResult=r;
}

// ─── SVG graf ─────────────────────────────────────────────────────────────────
const CHART={w:560,h:260,pl:56,pr:14,pt:14,pb:26};
const COL={value:'#C9A24B',equity:'#3FA37A',balance:'#D97A57',cumulative:'#6F86E0'};
function drawChart(r, animate){
  const {w,h,pl,pr,pt,pb}=CHART, iw=w-pl-pr, ih=h-pt-pb;
  const pts=[{value:state.purchasePrice,balance:r.loanAmount,equity:state.purchasePrice-r.loanAmount,cumulative:0}, ...r.projection];
  const n=pts.length-1;
  const S={value:pts.map(p=>p.value),equity:pts.map(p=>p.equity),balance:pts.map(p=>p.balance),cumulative:pts.map(p=>p.cumulative)};
  const all=[...S.value,...S.equity,...S.balance,...S.cumulative];
  let ymin=Math.min(0,...all), ymax=Math.max(...all,1); const pad=(ymax-ymin)*0.06; ymax+=pad; ymin-=pad;
  const X=i=>pl+(n===0?0:i/n)*iw, Y=v=>pt+(1-(v-ymin)/(ymax-ymin||1))*ih;
  const path=a=>a.map((v,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  const area=a=>`${path(a)} L${X(n).toFixed(1)},${Y(Math.max(0,ymin)).toFixed(1)} L${X(0).toFixed(1)},${Y(Math.max(0,ymin)).toFixed(1)} Z`;
  const dc=animate?' draw':'';

  const gl=[]; const steps=4;
  for(let s=0;s<=steps;s++){ const val=ymin+(ymax-ymin)*s/steps, y=Y(val);
    gl.push(`<line x1="${pl}" y1="${y.toFixed(1)}" x2="${w-pr}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`);
    gl.push(`<text x="${pl-8}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="9.5" fill="var(--faint)">${czkCompact(val)}</text>`);
  }
  const xl=[]; const stepX=Math.max(1,Math.ceil(n/6));
  for(let i=0;i<=n;i+=stepX){ xl.push(`<text x="${X(i).toFixed(1)}" y="${h-8}" text-anchor="middle" font-size="9.5" fill="var(--faint)">${i===0?t('ax_now'):t('ax_year',i)}</text>`); }
  const zero=(ymin<0&&ymax>0)?`<line x1="${pl}" y1="${Y(0).toFixed(1)}" x2="${w-pr}" y2="${Y(0).toFixed(1)}" stroke="var(--line-2)" stroke-width="1" stroke-dasharray="2 3"/>`:'';

  const chart=document.getElementById('chart');
  chart.innerHTML = `
    <defs><linearGradient id="eqg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${COL.equity}" stop-opacity="0.26"/><stop offset="100%" stop-color="${COL.equity}" stop-opacity="0.02"/>
    </linearGradient></defs>
    ${gl.join('')}${zero}${xl.join('')}
    <path class="area${dc}" d="${area(S.equity)}" fill="url(#eqg)" stroke="none"/>
    <path class="line${dc}" pathLength="1" d="${path(S.balance)}" stroke="${COL.balance}" stroke-width="1.6" stroke-dasharray="5 4" style="animation-delay:.15s"/>
    <path class="line${dc}" pathLength="1" d="${path(S.value)}" stroke="${COL.value}" stroke-width="2.2"/>
    <path class="line${dc}" pathLength="1" d="${path(S.equity)}" stroke="${COL.equity}" stroke-width="2.2" style="animation-delay:.08s"/>
    <path class="line${dc}" pathLength="1" d="${path(S.cumulative)}" stroke="${COL.cumulative}" stroke-width="2" style="animation-delay:.22s"/>
    <circle class="dot${dc}" cx="${X(n).toFixed(1)}" cy="${Y(S.value[n]).toFixed(1)}" r="3" fill="${COL.value}"/>
    <circle class="dot${dc}" cx="${X(n).toFixed(1)}" cy="${Y(S.equity[n]).toFixed(1)}" r="3" fill="${COL.equity}"/>
    <rect id="hitbox" x="${pl}" y="${pt}" width="${iw}" height="${ih}" fill="transparent"/>
    <g id="cross" style="display:none"><line stroke="var(--line-2)" stroke-width="1"/></g>`;

  const cross=chart.querySelector('#cross'), crossLine=cross.querySelector('line');
  const tip=document.getElementById('tip'), wrap=document.getElementById('chartWrap');
  const move=ev=>{
    const rect=chart.getBoundingClientRect();
    let i=Math.round(((ev.clientX-rect.left)/rect.width*w-pl)/iw*n); i=Math.max(0,Math.min(n,i));
    const px=X(i);
    cross.style.display=''; crossLine.setAttribute('x1',px); crossLine.setAttribute('x2',px); crossLine.setAttribute('y1',pt); crossLine.setAttribute('y2',pt+ih);
    tip.style.opacity=1;
    tip.innerHTML=`<div class="tip-yr">${i===0?t('tip_now'):t('tip_year',i)}</div>`+
      `<div class="tip-row"><span style="color:${COL.value}">${t('lg_value')}</span><b>${czkCompact(S.value[i])}</b></div>`+
      `<div class="tip-row"><span style="color:${COL.equity}">${t('lg_equity')}</span><b>${czkCompact(S.equity[i])}</b></div>`+
      `<div class="tip-row"><span style="color:${COL.balance}">${t('lg_loan')}</span><b>${czkCompact(S.balance[i])}</b></div>`+
      `<div class="tip-row"><span style="color:${COL.cumulative}">${t('lg_cf')}</span><b>${czkCompact(S.cumulative[i])}</b></div>`;
    const left=Math.min(wrap.clientWidth-tip.offsetWidth-4, Math.max(0,(px/w)*wrap.clientWidth-tip.offsetWidth/2));
    tip.style.left=left+'px'; tip.style.top='4px';
  };
  const hit=chart.querySelector('#hitbox');
  hit.addEventListener('mousemove',move);
  hit.addEventListener('mouseleave',()=>{ cross.style.display='none'; tip.style.opacity=0; });
}

// ─── Ukládání ─────────────────────────────────────────────────────────────────
function loadAll(){ try{ return JSON.parse(localStorage.getItem(STORE)||'[]'); }catch{ return []; } }
function saveAll(a){ localStorage.setItem(STORE, JSON.stringify(a)); }
function uid(){ return 'r'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function currentInputs(){ const {_title,_address,...rest}=state; return rest; }

function doSave(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){ toast(t('need_title'),'err'); document.getElementById('f-title').focus(); return; }
  const address=document.getElementById('f-address').value.trim();
  const all=loadAll();
  const rec={ id:currentId||uid(), title, address, inputs:currentInputs(), updatedAt:Date.now() };
  const idx=all.findIndex(x=>x.id===rec.id);
  if(idx>=0) all[idx]=rec; else all.unshift(rec);
  saveAll(all); currentId=rec.id; renderSaved(); updateActions(); toast(t('saved_ok'),'ok');
}
function doDelete(){
  if(!currentId) return;
  if(!confirm(t('confirm_delete'))) return;
  saveAll(loadAll().filter(x=>x.id!==currentId));
  newAnalysis(); renderSaved(); toast(t('deleted_ok'),'ok');
}
function loadRecord(id){
  const rec=loadAll().find(x=>x.id===id); if(!rec) return;
  state={...DEFAULTS, ...rec.inputs, _title:rec.title, _address:rec.address||''};
  currentId=rec.id; syncInputs(); render(true); updateActions(); closeSaved();
  window.scrollTo({top:0, behavior:'smooth'});
}
function newAnalysis(){
  state={...DEFAULTS}; currentId=null;
  document.getElementById('f-title').value=''; document.getElementById('f-address').value='';
  syncInputs(); render(true); updateActions(); closeSaved();
}
function updateActions(){
  document.getElementById('deleteBtn').style.display = currentId ? '' : 'none';
  document.getElementById('saveBtn').textContent = currentId ? t('save_edit') : t('save');
}
function renderSaved(){
  const all=loadAll(); const panel=document.getElementById('savedPanel');
  document.getElementById('savedCount').textContent = all.length ? `(${all.length})` : '';
  if(!all.length){ panel.innerHTML=`<div class="dd-empty">${t('sv_empty')}</div>`; return; }
  const dc={good:'var(--good)',borderline:'var(--warn)',poor:'var(--bad)'};
  panel.innerHTML = all.map(rec=>{
    const r=calculate({...DEFAULTS,...rec.inputs});
    return `<div class="saved-item" data-id="${rec.id}"><span class="dot" style="background:${dc[r.verdict.rating]}"></span>
      <div class="si-main"><div class="si-title">${escapeHtml(rec.title)}</div>
      <div class="si-sub">${t('si_sub', czk(r.monthlyPre), pct(r.netYield))}</div></div>
      <button class="si-del" data-del="${rec.id}" aria-label="${t('delete')}">×</button></div>`;
  }).join('');
  panel.querySelectorAll('.saved-item').forEach(el=>{ el.addEventListener('click', e=>{ if(e.target.closest('[data-del]')) return; loadRecord(el.dataset.id); }); });
  panel.querySelectorAll('[data-del]').forEach(b=>{ b.addEventListener('click', e=>{ e.stopPropagation(); const id=b.dataset.del;
    if(confirm(t('confirm_delete_one'))){ saveAll(loadAll().filter(x=>x.id!==id)); if(currentId===id) newAnalysis(); renderSaved(); } }); });
}
function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let toastTimer=null;
function toast(msg,kind){ const el=document.getElementById('toast'); el.textContent=msg; el.className='toast '+(kind||''); clearTimeout(toastTimer); toastTimer=setTimeout(()=>{ el.textContent=''; },3500); }

function openSaved(){ document.getElementById('savedPanel').classList.add('open'); document.getElementById('savedBtn').setAttribute('aria-expanded','true'); }
function closeSaved(){ document.getElementById('savedPanel').classList.remove('open'); document.getElementById('savedBtn').setAttribute('aria-expanded','false'); }

// ─── Jazyk ────────────────────────────────────────────────────────────────────
function setLang(lang, initial){
  LANG = (lang==='vi')?'vi':'cs'; LOCALE = LANG==='vi'?'vi-VN':'cs-CZ';
  localStorage.setItem(LANGKEY, LANG);
  document.getElementById('langSeg').dataset.active = LANG;
  document.querySelectorAll('#langSeg button').forEach(b=>b.classList.toggle('active', b.dataset.lang===LANG));
  applyStaticI18n();
  render(!initial); renderSaved(); updateActions();
  if(!initial){ // jemně znovu přehraj nástupovou animaci obsahu
    document.querySelectorAll('.anim').forEach(el=>{ el.style.animation='none'; void el.offsetWidth; el.style.animation=''; });
  }
}

// ─── Motiv ────────────────────────────────────────────────────────────────────
function applyTheme(tm){ if(tm==='light'||tm==='dark') document.documentElement.setAttribute('data-theme',tm); else document.documentElement.removeAttribute('data-theme'); }
function currentTheme(){ const a=document.documentElement.getAttribute('data-theme'); if(a) return a; return matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'; }
function toggleTheme(){ const next=currentTheme()==='dark'?'light':'dark'; applyTheme(next); localStorage.setItem(THEME,next); if(lastResult) drawChart(lastResult,false); }

// ─── AI poradce (přes serverless funkci /api/rada) ──────────────────────────
const AI_ENDPOINT = '/api/rada';
let aiChat = [];

function aiContext(){
  if(!lastResult) return '';
  const r=lastResult, i=state;
  return [
    `${t('f_price')}: ${czk(i.purchasePrice)} (+ ${t('f_acq')} ${czk(i.acquisitionCosts)}, ${t('f_renov')} ${czk(i.renovationCosts)})`,
    i.financing==='mortgage'
      ? `${t('fin_mortgage')}: ${t('f_down')} ${i.downPaymentPct}%, ${t('f_rate')} ${i.interestRate}% p.a., ${t('f_term')} ${i.loanTermYears}, ${t('f_fixation')} ${i.fixationYears}, ${t('f_ratefix')} ${i.rateAfterFix}%`
      : t('fin_cash'),
    `${t('f_rent')}: ${czk(i.monthlyRent)} · ${t('f_vac')} ${i.vacancyPct}% · ${t('f_appr')} ${i.appreciationPct}%/r · ${t('f_growth')} ${i.rentGrowthPct}%/r`,
    `${t('m_cf')}: ${czk(r.monthlyPre)} · ${t('m_ny')} ${pct(r.netYield)} · ${t('m_gy')} ${pct(r.grossYield)} · ${t('m_coc')} ${pct(r.coc)}`,
    `${t('m_tot')}: ${pct(r.annualized)} (IRR, ${i.horizonYears}) ${r.isM && r.dscr!==null ? '· DSCR '+nf(r.dscr,2) : ''}`,
    `Verdikt: ${r.verdict.label}`,
  ].join('\n');
}

async function aiCall(payload){
  const res = await fetch(AI_ENDPOINT, {
    method:'POST', headers:{'content-type':'application/json'},
    body: JSON.stringify({ ...payload, lang: LANG }),
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || ('HTTP '+res.status));
  return data.text || '';
}
function aiOffline(){ return location.protocol==='file:' ? t('ai_offline') : null; }

async function aiReview(){
  const out=document.getElementById('aiReviewOut'), off=aiOffline();
  if(off){ out.className='ai-out muted'; out.textContent=off; return; }
  const btn=document.getElementById('aiReviewBtn'); btn.disabled=true;
  out.className='ai-out muted'; out.textContent=t('ai_loading');
  try{ out.textContent=await aiCall({mode:'komentar', context:aiContext()}); out.className='ai-out'; }
  catch(e){ out.className='ai-out muted'; out.textContent=t('ai_error', e.message); }
  finally{ btn.disabled=false; }
}
async function aiEstimate(){
  const inp=document.getElementById('aiEstimateIn'), out=document.getElementById('aiEstimateOut');
  const desc=inp.value.trim(); if(!desc){ inp.focus(); return; }
  const off=aiOffline(); if(off){ out.className='ai-out muted'; out.textContent=off; return; }
  const btn=document.getElementById('aiEstimateBtn'); btn.disabled=true;
  out.className='ai-out muted'; out.textContent=t('ai_loading');
  try{ out.textContent=await aiCall({mode:'odhad', description:desc}); out.className='ai-out'; }
  catch(e){ out.className='ai-out muted'; out.textContent=t('ai_error', e.message); }
  finally{ btn.disabled=false; }
}
function renderChat(){
  const log=document.getElementById('aiChatLog');
  log.innerHTML=aiChat.map(m=>`<div class="ai-bubble ${m.role==='user'?'user':'bot'}">${escapeHtml(m.content)}</div>`).join('');
  log.scrollTop=log.scrollHeight;
}
async function aiSend(){
  const inp=document.getElementById('aiChatIn'), q=inp.value.trim(); if(!q) return;
  const off=aiOffline(); if(off){ aiChat.push({role:'user',content:q},{role:'assistant',content:off}); inp.value=''; renderChat(); return; }
  aiChat.push({role:'user', content:q}); inp.value='';
  aiChat.push({role:'assistant', content:t('ai_loading')}); renderChat();
  const btn=document.getElementById('aiChatSend'); btn.disabled=true;
  try{
    const history=aiChat.slice(0,-1);
    const text=await aiCall({mode:'chat', context:aiContext(), messages:history});
    aiChat[aiChat.length-1]={role:'assistant', content:text};
  }catch(e){ aiChat[aiChat.length-1]={role:'assistant', content:t('ai_error', e.message)}; }
  finally{ btn.disabled=false; renderChat(); }
}
function initAI(){
  document.getElementById('aiTabs').addEventListener('click', e=>{
    const b=e.target.closest('button[data-ai]'); if(!b) return;
    document.querySelectorAll('#aiTabs button').forEach(x=>x.classList.toggle('active', x===b));
    document.querySelectorAll('.ai-pane').forEach(p=>{ p.hidden = p.dataset.pane!==b.dataset.ai; });
  });
  document.getElementById('aiReviewBtn').addEventListener('click', aiReview);
  document.getElementById('aiEstimateBtn').addEventListener('click', aiEstimate);
  document.getElementById('aiChatSend').addEventListener('click', aiSend);
  document.getElementById('aiChatIn').addEventListener('keydown', e=>{ if(e.key==='Enter') aiSend(); });
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function init(){
  // Světlý režim jako výchozí (pokud si uživatel dřív nezvolil jinak)
  applyTheme(localStorage.getItem(THEME) || 'light');
  buildForm(); syncInputs();
  setLang(localStorage.getItem(LANGKEY) || 'cs', true);

  document.getElementById('langSeg').addEventListener('click', e=>{ const b=e.target.closest('button[data-lang]'); if(b) setLang(b.dataset.lang); });
  document.getElementById('finToggle').addEventListener('click', e=>{ const b=e.target.closest('button[data-fin]'); if(!b) return; state.financing=b.dataset.fin; syncInputs(); render(true); });
  document.getElementById('taxToggle').addEventListener('click', e=>{ const b=e.target.closest('button[data-tax]'); if(!b) return; state.taxMethod=b.dataset.tax; syncInputs(); render(false); });
  document.getElementById('f-title').addEventListener('input', e=>{ state._title=e.target.value; });
  document.getElementById('f-address').addEventListener('input', e=>{ state._address=e.target.value; });
  document.getElementById('saveBtn').addEventListener('click', doSave);
  document.getElementById('deleteBtn').addEventListener('click', doDelete);
  document.getElementById('newBtn').addEventListener('click', newAnalysis);
  document.getElementById('themeBtn').addEventListener('click', toggleTheme);
  document.getElementById('savedBtn').addEventListener('click', e=>{ e.stopPropagation(); document.getElementById('savedPanel').classList.contains('open')?closeSaved():openSaved(); });
  document.addEventListener('click', e=>{ if(!e.target.closest('.dd')) closeSaved(); });
  window.addEventListener('resize', ()=>{ if(lastResult) drawChart(lastResult,false); });
  initAI();
}
init();
</script>
